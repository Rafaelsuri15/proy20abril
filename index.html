<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tarea</title>
<style>
    body {
    background-color: bisque;
    margin: 0;
    font-family: Arial, sans-serif;
}

.padre {
    width: 100%;
}


.titulo, .pie {
    background-color: aliceblue;
    margin: 5px;
    padding: 20px;
    text-align: center;
}


.contenido {
    display: flex;
    margin: 5px;
}

.foto, .texto {
    flex: 1;
    background-color: aliceblue;
    margin: 5px;
    padding: 20px;
    text-align: center;
}


.foto img {
    max-width: 100%;
    height: 100%;
}
</style>
</head>
<body>

<div class="padre">
  <div class="titulo">
    <h1>Rafael Andres Alvarez</h1>
  </div>
</div>


<div class="padre">
  <div class="contenido">
    
    <div class="foto">
      <img src="hola.jpg" alt="Imagen">
    </div>

    <div class="texto">
      <h4>ME gusta crear codigo y bailar en la academia evolucion, y sobre todo jugar basquet.</h4>
    </div>

  </div>
</div>

<div class="padre">
  <div class="pie">
    <h4>Creado por Rafita producciones</h4>
  </div>
</div>

</body>
</html>
